<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM — дашборд управляющего</title>
  <link rel="stylesheet" href="crm-proto.css" />
</head>
<body class="page-dashboard page-cat-manager">
  <header class="topbar">
    <div class="topbar__user">
      <span class="topbar__name" id="managerName">Сергей Орлов</span>
    </div>
    <a class="link-exit" href="index.html">Выйти</a>
  </header>

  <nav class="tabs tabs--manager" role="tablist" aria-label="Разделы управляющего">
    <button type="button" class="tabs__btn is-active" role="tab" aria-selected="true" data-tab="dashboard">Дашборд</button>
    <button type="button" class="tabs__btn" role="tab" aria-selected="false" data-tab="plan">План</button>
    <button type="button" class="tabs__btn" role="tab" aria-selected="false" data-tab="metrics-tt">Метрики по ТТ</button>
    <button type="button" class="tabs__btn" role="tab" aria-selected="false" data-tab="seller-rating">Рейтинг продавцов</button>
  </nav>

  <div class="cat-dash__month-strip" id="catMonthStrip" role="region" aria-label="Фильтры отчёта">
    <div class="cat-dash__filters">
      <div class="cat-dash__filter-group">
        <label class="cat-dash__filter-heading muted" for="catFilterMonth">Месяц</label>
        <select id="catFilterMonth" class="input cat-dash__filter-input" aria-label="Месяц">
          <option value="feb">Февраль 2026</option>
          <option value="mar">Март 2026</option>
          <option value="apr">Апрель 2026</option>
        </select>
      </div>
      <div class="cat-dash__filter-group">
        <label class="cat-dash__filter-heading muted" for="catFilterCategory">Категория</label>
        <select id="catFilterCategory" class="input cat-dash__filter-input"></select>
      </div>
      <div class="cat-dash__filter-group">
        <label class="cat-dash__filter-heading muted" for="catFilterStore">Торговая точка</label>
        <select id="catFilterStore" class="input cat-dash__filter-input"></select>
      </div>
      <div class="cat-dash__filter-group">
        <label class="cat-dash__filter-heading muted" for="catFilterRegion">Регион</label>
        <select id="catFilterRegion" class="input cat-dash__filter-input">
          <option value="">Все регионы</option>
          <option value="volgograd">Волгоград</option>
          <option value="murmansk">Мурманск</option>
        </select>
      </div>
      <div class="cat-dash__filter-group">
        <label class="cat-dash__filter-heading muted" for="catFilterPeriod">Период</label>
        <select id="catFilterPeriod" class="input cat-dash__filter-input">
          <option value="">Весь месяц</option>
          <option value="d1">1–10 число</option>
          <option value="d2">11–20 число</option>
          <option value="d3">21 число — конец</option>
        </select>
      </div>
    </div>
  </div>

  <main class="panel">
    <section class="tab-panel is-visible cat-dash" id="panel-dashboard" role="tabpanel">
      <div class="cat-dash__plan-layout">
        <article class="dash-card cat-dash__plan-card cat-dash__plan-card--context">
          <p class="muted cat-dash__data-stamp" id="catMetricsDataStamp" aria-live="polite"></p>
        </article>
        <div id="catMetricsMainBlock">
          <article id="catMetricsKpiSection" class="dash-card cat-dash__plan-card cat-dash__plan-card--kpis" aria-label="Сводка по показателям">
            <div id="catMetricsSummaryKpis" class="cat-dash__metrics-summary-kpis" hidden></div>
          </article>
          <article id="catMetricsTablePanel" class="dash-card cat-dash__plan-card cat-dash__plan-card--table">
            <h3 class="seller-plan-card__title">Детализация по точкам</h3>
            <div id="catMetricsDataTableSection" class="cat-dash__metrics-data-table-section">
              <div class="cat-dash__table-wrap">
                <table class="cat-dash__table cat-dash__table--metrics">
                  <thead id="catMetricsThead"></thead>
                  <tbody id="catMetricsTableBody"></tbody>
                </table>
              </div>
            </div>
          </article>
        </div>
        <div id="catMetricsDrilldown" class="cat-dash__metrics-drilldown dash-card cat-dash__plan-card" hidden>
          <div class="cat-dash__metrics-drill-head">
            <button type="button" class="btn btn--secondary cat-dash__metrics-drill-back" id="catMetricsDrillBack">
              ← Назад к показателям
            </button>
            <h4 class="cat-dash__metrics-drill-title" id="catMetricsDrillTitle"></h4>
          </div>
          <p class="muted cat-dash__metrics-drill-hint">Показатели по категориям для выбранной торговой точки</p>
          <div class="cat-dash__table-wrap">
            <table class="cat-dash__table cat-dash__table--metrics">
              <thead id="catMetricsDrillThead"></thead>
              <tbody id="catMetricsDrillBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
    <section class="tab-panel" id="panel-plan" role="tabpanel" hidden>
      <div class="manager-plan-entry" id="managerPlanEntry">
        <h2 class="manager-plan-entry__title">План</h2>
        <div class="manager-plan-entry__toolbar">
          <div class="manager-plan-entry__field">
            <label class="manager-plan-entry__label" for="planEntryMonth">Месяц</label>
            <select id="planEntryMonth" class="input manager-plan-entry__select" aria-label="Месяц планирования"></select>
          </div>
          <p class="manager-plan-entry__saved" id="planEntrySavedAt"></p>
          <div class="manager-plan-entry__actions">
            <button type="button" class="btn btn--primary" id="planEntrySave">Сохранить план</button>
            <button type="button" class="btn btn--secondary" id="planEntryCopyPrev" title="Копирует цифры с предыдущего месяца, если план тогда сохраняли">Скопировать с прошлого месяца</button>
          </div>
        </div>
        <p class="manager-plan-entry__status" id="planEntryStatus" aria-live="polite" role="status"></p>
        <article class="dash-card manager-plan-entry__table-card">
          <h3 class="seller-plan-card__title">Плановые значения по точкам</h3>
          <div class="manager-plan-entry__scroll" role="region" aria-label="Таблица планов">
            <table class="manager-plan-entry__table" id="planEntryTable">
              <thead id="planMatrixHead"></thead>
              <tbody id="planMatrixBody"></tbody>
            </table>
          </div>
        </article>
      </div>
    </section>
    <section class="tab-panel" id="panel-metrics-tt" role="tabpanel" hidden>
      <h2>Метрики по ТТ</h2>
      <p class="muted">Показатели по торговым точкам (прототип).</p>
    </section>
    <section class="tab-panel" id="panel-seller-rating" role="tabpanel" hidden>
      <h2>Рейтинг продавцов</h2>
      <p class="muted">Тот же список из 24 продавцов, что и у роли «Продавец» во вкладке «Рейтинг».</p>
      <ol class="rating-list" id="sellerRatingList"></ol>
    </section>
  </main>

  <script src="crm-rating.js"></script>
  <script src="crm-tt-stores.js"></script>
  <script src="crm-cat-dashboard-metrics.js"></script>
  <script src="crm-manager-plan.js"></script>
  <script>
    (function () {
      var map = {
        dashboard: 'panel-dashboard',
        plan: 'panel-plan',
        'metrics-tt': 'panel-metrics-tt',
        'seller-rating': 'panel-seller-rating'
      };

      (function fillTeamAndRating() {
        var people = window.CRM.getRatingPeople();
        var top5 = people.slice(0, 5);
        var teamEl = document.getElementById('teamComposition');
        var listEl = document.getElementById('sellerRatingList');
        if (teamEl) {
          teamEl.innerHTML = '';
          top5.forEach(function (s) {
            var li = document.createElement('li');
            li.className = 'team-roster__row';
            li.innerHTML =
              '<span class="team-roster__name">' +
              s.name +
              '</span><span class="team-roster__rating">★ ' +
              s.rating.toFixed(1) +
              '</span>';
            teamEl.appendChild(li);
          });
        }
        if (listEl) {
          listEl.innerHTML = '';
          people.forEach(function (s, idx) {
            var li = document.createElement('li');
            li.className = 'rating-list__row';
            li.innerHTML =
              '<span class="rating-list__name">' +
              (idx + 1) +
              '. ' +
              s.name +
              '</span><span class="rating-list__score">★ ' +
              s.rating.toFixed(1) +
              '</span>';
            listEl.appendChild(li);
          });
        }
      })();

      var buttons = document.querySelectorAll('.tabs__btn');
      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          var key = btn.getAttribute('data-tab');
          buttons.forEach(function (b) {
            b.classList.remove('is-active');
            b.setAttribute('aria-selected', 'false');
          });
          btn.classList.add('is-active');
          btn.setAttribute('aria-selected', 'true');

          Object.keys(map).forEach(function (k) {
            var el = document.getElementById(map[k]);
            if (!el) return;
            if (k === key) {
              el.hidden = false;
              el.classList.add('is-visible');
            } else {
              el.hidden = true;
              el.classList.remove('is-visible');
            }
          });
          var monthStrip = document.getElementById('catMonthStrip');
          if (monthStrip) monthStrip.hidden = key !== 'dashboard';
        });
      });
    })();
  </script>
</body>
</html>
